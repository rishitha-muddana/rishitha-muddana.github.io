<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found · Rishitha Muddana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #FAFAF8;
      color: #0F1F3D;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    .initials {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 3rem;
      font-weight: 700;
      color: #C9963A;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }
    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 2rem;
      font-weight: 700;
      color: #0F1F3D;
      margin: 0 0 12px;
    }
    p { color: #6B7280; font-size: 0.95rem; margin: 0 0 32px; line-height: 1.6; }
    .countdown { font-size: 1rem; color: #1E3A5F; margin-bottom: 16px; }
    .bar-track {
      width: 100%;
      max-width: 300px;
      height: 3px;
      background: #E8E4DC;
      border-radius: 2px;
      margin: 0 auto 28px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: #C9963A;
      border-radius: 2px;
      width: 0%;
      transition: width 0.9s linear;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 11px 24px;
      background: #0F1F3D;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="initials">RM</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist. You'll be redirected to the homepage automatically.</p>
    <div class="countdown">Redirecting in <strong id="countdown">5</strong> seconds…</div>
    <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
    <a href="/">Take me home</a>
  </div>
  <script>
    let t = 5;
    const el = document.getElementById('countdown');
    const bar = document.getElementById('bar');
    const iv = setInterval(() => {
      el.textContent = --t;
      bar.style.width = ((5 - t) / 5 * 100) + '%';
      if (t <= 0) { clearInterval(iv); window.location.href = '/'; }
    }, 1000);
  </script>
</body>
</html>
